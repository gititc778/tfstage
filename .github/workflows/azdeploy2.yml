name: "Deploy_Azure2"
run-name: "${{ inputs.module }} Deploy to ${{ inputs.workspace }}"

on:
  workflow_dispatch:
    inputs:
      module:
        description: 'Module to deploy (All, Databricks, Data Factory, Synapse, Functions, CosmosDB, EventHub)'
        required: true
        default: 'All'
        type: choice
        options:
        - All
        - Databricks
        - Data Factory
        - Synapse
        - Functions
        - CosmosDB
        - EventHub
      # --- UPDATED INPUT TO CHOICE ---
      workspace:
        description: 'Hardcoded workspace to operate on'
        required: true
        default: 'azure1'
        type: choice
        options:
        - azure1
        - azure2

permissions:
  contents: read
  pull-requests: write

jobs:
  terraform:
    name: "${{ inputs.module == 'All' && 'Terraform Deploy ALL' || format('Terraform Deploy {0}', inputs.module) }} to ${{ inputs.workspace }}"
    runs-on: ubuntu-latest
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2
        with:
          terraform_version: 1.5.0

      - name: Terraform Init
        run: terraform init

      # --- UPDATED STEP TO USE CHOICE ---
      - name: Select or Create Workspace
        run: |
          terraform workspace select ${{ inputs.workspace }} || \
          terraform workspace new ${{ inputs.workspace }}

      - name: Terraform Format
        run: terraform fmt -check

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          # Map display names to internal module names
          declare -A MODULE_MAP=(
            ["All"]="all"
            ["Databricks"]="databricks"
            ["Data Factory"]="data_factory"
            ["Synapse"]="synapse"
            ["Functions"]="functions"
            ["CosmosDB"]="cosmosdb"
            ["EventHub"]="eventhub"
          )
          
          SELECTED_MODULE="${MODULE_MAP[${{ inputs.module }}]}"
          
          echo "Selected Input: ${{ inputs.module }}"
          echo "Internal Module: $SELECTED_MODULE"
          echo "Workspace: ${{ inputs.workspace }}"
          
          if [ "$SELECTED_MODULE" == "all" ]; then
            echo "Running full plan for workspace ${{ inputs.workspace }}..."
            terraform plan -out=tfplan
          else
            echo "Running targeted plan for: module.$SELECTED_MODULE in ${{ inputs.workspace }}"
            terraform plan -target=module.$SELECTED_MODULE -out=tfplan
          fi

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan
